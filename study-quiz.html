<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surry ILT Practice</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f0;--surface:#fff;--border:#d0cfc8;--border-light:#e8e7e0;--text:#1a1a18;--muted:#6b6b66;--accent:#1a5fa8;--accent-light:#e6f0fa;--accent-dark:#0d3f72;--green:#2d7a3a;--green-light:#eaf4ec;--red:#b52a2a;--red-light:#faeaea;--yellow:#7a6200;--yellow-light:#fdf5d0;--radius:4px;--ui:'Helvetica Neue',Arial,sans-serif}
body{font-family:var(--ui);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;min-height:100vh}
nav{background:#1e3a5f;border-bottom:2px solid #142d4d}
.nav-inner{max-width:960px;margin:0 auto;display:flex;align-items:center}
.nav-brand{font-weight:700;font-size:15px;color:#fff;padding:10px 18px;background:#142d4d;text-decoration:none;white-space:nowrap}
.nav-links{display:flex;list-style:none}
.nav-links a{display:block;color:#c8d8ed;padding:10px 14px;font-size:13px;text-decoration:none;border-right:1px solid #2a4f7a;transition:background .15s}
.nav-links a:hover,.nav-links a.active{background:#142d4d;color:#fff}
.page{max-width:960px;margin:0 auto;padding:24px 16px}
.section-title{background:#2a5090;color:#fff;font-size:14px;font-weight:700;padding:6px 12px;margin-bottom:12px;letter-spacing:.5px;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}
.home-desc{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:14px}
.quiz-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.quiz-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;cursor:pointer;transition:border-color .15s,background .15s}
.quiz-card:hover,.quiz-card.selected{border-color:var(--accent);background:var(--accent-light)}
.quiz-card h3{font-size:14px;font-weight:700;color:var(--accent-dark);margin-bottom:4px}
.quiz-card p{font-size:12px;color:var(--muted)}
select{border:1px solid var(--border);border-radius:var(--radius);padding:5px 8px;font-size:13px;font-family:var(--ui);background:var(--surface);color:var(--text)}
.form-row{margin-bottom:14px}
.year-grid{display:flex;flex-wrap:wrap;gap:12px;margin-top:6px}
.year-item{display:flex;align-items:center;gap:7px;font-size:13px;cursor:pointer;padding:3px 0}
.year-item input{cursor:pointer;accent-color:var(--accent)}
label{font-size:13px;font-weight:700;display:block;margin-bottom:4px}
.btn{display:inline-block;padding:7px 18px;border-radius:var(--radius);font-size:13px;font-weight:700;font-family:var(--ui);cursor:pointer;border:none;transition:background .15s;text-decoration:none}
.btn-primary{background:#1e3a5f;color:#fff}
.btn-primary:hover{background:#142d4d;color:#fff}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--bg)}
.btn-group{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.q-header{display:flex;justify-content:space-between;margin-bottom:12px;font-size:12px;color:var(--muted)}
.q-progress-bar{height:5px;background:var(--border-light);border-radius:3px;margin-bottom:16px;overflow:hidden}
.q-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s}
.q-num-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:2px;font-weight:700;background:#f0f0e8;color:#666;margin-bottom:12px}
.scenario-box{background:#f4f6f9;border:1px solid #c8d4e4;border-left:3px solid #2a5090;border-radius:var(--radius);padding:12px 16px;margin-bottom:14px;font-size:13px;line-height:1.7}
.scenario-box .slabel{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#2a5090;font-weight:700;margin-bottom:5px;margin-top:8px}
.scenario-box .slabel:first-child{margin-top:0}
.scenario-box ul{padding-left:18px}
.scenario-box ul li{margin-bottom:3px}
.q-stem{font-size:14px;line-height:1.7;margin-bottom:18px;color:var(--text);white-space:pre-wrap}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);cursor:pointer;font-size:13px;font-family:var(--ui);text-align:left;transition:border-color .15s,background .15s;width:100%;color:var(--text);line-height:1.6}
.choice-btn:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light)}
.choice-btn:disabled{cursor:default}
.cltr{font-weight:700;font-size:13px;min-width:20px;color:var(--accent);flex-shrink:0;margin-top:1px}
.choice-btn.correct{border-color:var(--green);background:var(--green-light)}
.choice-btn.correct .cltr{color:var(--green)}
.choice-btn.wrong{border-color:var(--red);background:var(--red-light)}
.choice-btn.wrong .cltr{color:var(--red)}
.cparts{display:flex;flex-direction:column;gap:1px}
.cpart .pn{color:var(--muted);font-size:12px;min-width:24px;display:inline-block}
.answer-feedback{margin-top:14px;padding:10px 14px;border-radius:var(--radius);font-size:14px;font-weight:700;display:none}
.answer-feedback.show{display:block}
.answer-feedback.correct{background:var(--green-light);border:1px solid #a3d4ac;color:var(--green)}
.answer-feedback.wrong{background:var(--red-light);border:1px solid #e8aaaa;color:var(--red)}
.q-nav{display:flex;justify-content:flex-end;margin-top:16px}
.keyboard-hint{font-size:11px;color:var(--muted);margin-top:10px}
.score-banner{text-align:center;padding:24px;border-radius:var(--radius);margin-bottom:20px}
.score-banner.pass{background:var(--green-light);border:1px solid #a3d4ac}
.score-banner.fail{background:var(--red-light);border:1px solid #e8aaaa}
.score-banner.ok{background:var(--yellow-light);border:1px solid #e2d080}
.score-big{font-size:52px;font-weight:700;line-height:1}
.score-banner.pass .score-big{color:var(--green)}
.score-banner.fail .score-big{color:var(--red)}
.score-banner.ok .score-big{color:var(--yellow)}
.score-label{font-size:14px;margin-top:6px;color:var(--muted)}
.stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.stat-box{flex:1;min-width:100px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;text-align:center}
.stat-num{font-size:26px;font-weight:700}
.stat-num.green{color:var(--green)}
.stat-num.red{color:var(--red)}
.stat-lbl{font-size:12px;color:var(--muted)}
.review-item{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.review-header{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface)}
.review-header:hover{background:var(--bg)}
.review-status{font-size:12px;font-weight:700;padding:2px 8px;border-radius:2px;white-space:nowrap;margin-top:2px;flex-shrink:0}
.status-correct{background:var(--green-light);color:var(--green)}
.status-wrong{background:var(--red-light);color:var(--red)}
.review-q-text{font-size:13px;flex:1;line-height:1.5}
.review-body{padding:12px 14px;background:#fafafa;border-top:1px solid var(--border-light);display:none;font-size:13px}
.review-body.open{display:block}
.review-scenario{background:#f4f6f9;border:1px solid #c8d4e4;border-left:3px solid #2a5090;border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;font-size:12px;line-height:1.6}
.review-scenario .slabel{font-size:11px;text-transform:uppercase;color:#2a5090;font-weight:700;display:block;margin-bottom:3px;margin-top:6px}
.review-scenario .slabel:first-child{margin-top:0}
.review-stem{white-space:pre-wrap;margin-bottom:8px}
.review-choice{padding:4px 0;line-height:1.5}
.review-choice.correct-ans{color:var(--green);font-weight:700}
.review-choice.wrong-ans{color:var(--red)}
.screen{display:none}
.screen.active{display:block}
@media(max-width:600px){.quiz-grid{grid-template-columns:1fr}.stat-row{flex-direction:column}}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-brand" href="#" onclick="showScreen('home')">Surry ILT Practice</a>
    <ul class="nav-links">
      <li><a href="#" onclick="showScreen('home')" id="nav-home" class="active">Home</a></li>
      <li><a href="#" onclick="startSetup()" id="nav-quiz">Take Quiz</a></li>
    </ul>
  </div>
</nav>

<div id="screen-home" class="screen active">
  <div class="page">
    <div class="section-title">Welcome</div>
    <div class="card">
      <div class="home-desc">
        <p>Use <strong>A, B, C, D</strong> to select an answer &mdash; <strong>Enter</strong> to advance to the next question.</p>
      </div>
      <div class="quiz-grid" id="home-grid"></div>
      <div class="btn-group"><button class="btn btn-primary" onclick="startSetup()">Take a Quiz</button></div>
    </div>
  </div>
</div>

<div id="screen-setup" class="screen">
  <div class="page">
    <div class="section-title">Quiz Setup</div>
    <div class="card">
      <div class="form-row">
        <label>Category</label>
        <div class="quiz-grid" id="setup-grid" style="margin-top:6px;margin-bottom:0"></div>
      </div>
      <div class="form-row">
        <label for="q-count">Number of Questions</label>
        <select id="q-count">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="all">All</option>
        </select>
      </div>
      <div class="form-row">
        <label>Exam Year</label>
        <div class="year-grid" id="year-list"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="beginQuiz()">Start Quiz</button>
        <button class="btn btn-secondary" onclick="showScreen('home')">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div id="screen-quiz" class="screen">
  <div class="page">
    <div class="section-title" id="quiz-label">Quiz</div>
    <div class="card">
      <div class="q-header">
        <span id="q-counter">Question 1 of 10</span>
        <span id="q-score-live">Score: 0 / 0</span>
      </div>
      <div class="q-progress-bar"><div class="q-progress-fill" id="q-fill"></div></div>
      <div class="q-num-tag" id="q-num-tag"></div>
      <div id="q-scenario"></div>
      <div class="q-stem" id="q-stem"></div>
      <div class="choices" id="q-choices"></div>
      <div class="answer-feedback" id="q-feedback"></div>
      <div class="q-nav">
        <button class="btn btn-primary" id="q-next" onclick="nextQ()" style="display:none">Next Question &rarr;</button>
      </div>
      <div class="keyboard-hint">Keyboard: A B C D to answer &nbsp;|&nbsp; Enter for next</div>
    </div>
  </div>
</div>

<div id="screen-results" class="screen">
  <div class="page">
    <div class="section-title">Quiz Results</div>
    <div id="score-banner" class="score-banner">
      <div class="score-big" id="score-pct"></div>
      <div class="score-label" id="score-desc"></div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num" id="res-total"></div><div class="stat-lbl">Total</div></div>
      <div class="stat-box"><div class="stat-num green" id="res-correct"></div><div class="stat-lbl">Correct</div></div>
      <div class="stat-box"><div class="stat-num red" id="res-wrong"></div><div class="stat-lbl">Incorrect</div></div>
    </div>
    <div class="btn-group" style="margin-bottom:16px">
      <button class="btn btn-primary" onclick="startSetup()">Take Another Quiz</button>
      <button class="btn btn-secondary" onclick="showScreen('home')">Home</button>
    </div>
    <div class="section-title">Review Questions</div>
    <div id="review-list"></div>
  </div>
</div>

<script>
const QB = {"2021 NRC SPS SRO Exam":{years:["2021"],questions:[
{n:1,year:"2021",ic:["Unit 1 was at 100%.","The crew responded to \"A\" RCS Loop T\u1d34\u1d3c\u1d1b failing low.","All actions have been completed for 0-AP-53.00, LOSS OF VITAL INSTRUMENTATION/CONTROLS.","I&C has placed the associated bistables for \"A\" Loop T\u1d00\u1d5b\u1d07 and \u0394T in TRIP."],cc:["Power Range NI N-44 failed low to 0%.","The team is performing 1-AP-4.00, NI MALFUNCTION."],gv:null,pre:null,
stem:"Which one of the following completes the statements below?\n\n1) Based on current conditions, placing the N-44 bistables in TRIP __(1)__ cause a reactor trip to occur.\n\n2) Based on current conditions, verifying P-7 permissive status lights within one hour __(2)__ required.",
choices:[[{n:"1)",t:"will not"},{n:"2)",t:"is not"}],[{n:"1)",t:"will"},{n:"2)",t:"is not"}],[{n:"1)",t:"will not"},{n:"2)",t:"is"}],[{n:"1)",t:"will"},{n:"2)",t:"is"}]],answer:0},

{n:2,year:"2021",ic:["The Crew has tripped Unit 1 from 100% due to a stuck open PRZR Safety Valve.","The crew was performing the actions of 1-ES-1.2, POST LOCA COOLDOWN AND DEPRESSURIZATION.","Both LHSI pumps have been stopped.","Normal Charging has been re-aligned and one Charging pump has been stopped.","All RCPs are OFF.","The crew has performed steps to depressurize the RCS to minimize Subcooling.","RCS subcooling was 39\u00b0F and stable."],cc:["RCS Subcooling is 25\u00b0F and trending LOWER.","PRZR level is 65% and trending HIGHER."],gv:null,pre:null,
stem:"Which one of the following is the required action to be taken in accordance with 1-ES-1.2?",
choices:[[{n:"",t:"Start charging pump(s) and align HHSI flow."}],[{n:"",t:"Start one RCP."}],[{n:"",t:"Manually initiate SI."}],[{n:"",t:"Turn on PRZR heaters."}]],answer:0},

{n:3,year:"2021",ic:null,cc:null,gv:["The following annunciators are alarming:\n\u25e6 1C-A2, RCP 1A THERMAL BARRIER HI FLOW.\n\u25e6 1C-A3, RCP 1A THERMAL BARRIER CC HI TEMP.","\"A\" RCP Thermal Barrier CC flow is 57 gpm.","The following Trip Valves are OPEN:\n\u25e6 1-CC-TV-120A, RCP 1A THERMAL BARRIER CC OUTLET TRIP VALVE.\n\u25e6 1-CC-TV-140A, RCP THERMAL BARRIER CC RET INSIDE TRIP VALVE.\n\u25e6 1-CC-TV-140B, RCP THERMAL BARRIER CC RET OUTSIDE TRIP VALVE."],pre:null,
stem:"Which ONE of the following completes both statements?\n\n1) In accordance with ARPs 1C-A2 and 1C-A3, __(1)__ is/are required to be manually closed.\n\n2) Closing 1-CC-TV-120A, RCP 1A THERMAL BARRIER CC OUTLET TRIP VALVE, __(2)__ ensure the minimum required containment isolation boundary is met.",
choices:[[{n:"1)",t:"1-CC-TV-120A only"},{n:"2)",t:"will"}],[{n:"1)",t:"1-CC-TV-120A and 1-CC-TV-140A/-140B"},{n:"2)",t:"will"}],[{n:"1)",t:"1-CC-TV-120A only"},{n:"2)",t:"will NOT"}],[{n:"1)",t:"1-CC-TV-120A and 1-CC-TV-140A/-140B"},{n:"2)",t:"will NOT"}]],answer:3},

{n:4,year:"2021",ic:null,cc:null,gv:["A Large Break LOCA has occurred on Unit 1.","The crew has reached Step 16 in 1-E-1, LOSS OF REACTOR OR SECONDARY COOLANT, but has not performed Step 16 yet. Step 16 is CHECK IF EDGs CAN BE STOPPED.","Annunciator 1A-A7, RWST LO LVL has just alarmed.","RWST level is 19.0% and lowering."],pre:null,
stem:"Based on the given conditions, which ONE of the following answers the questions below?\n\n1) Which action is required to be performed FIRST?\n\n2) As RWST level continues to lower to the RMT actuation level, what is the minimum number of channels for RMT to actuate?",
choices:[[{n:"1)",t:"Place SI in Cold Leg Recirculation."},{n:"2)",t:"Two (2)."}],[{n:"1)",t:"Place SI in Cold Leg Recirculation."},{n:"2)",t:"Three (3)."}],[{n:"1)",t:"Check if EDGs can be stopped."},{n:"2)",t:"Three (3)."}],[{n:"1)",t:"Check if EDGs can be stopped."},{n:"2)",t:"Two (2)."}]],answer:0},

{n:5,year:"2021",ic:null,cc:null,gv:["Unit 1 is at 100% power.","The Unit 1 RO has just observed the following:\n\u25e6 Annunciators 1C-D3/-E3/-F3, RCP 1A/1B/1C SEAL WTR LO INJ FLOW, are all alarming.\n\u25e6 All Seal Injection flows indicate 2 gpm each.\n\u25e6 Charging flow has lowered from 88 gpm to 63 gpm.\n\u25e6 Charging Pump discharge pressure lowered to 2315 psig."],pre:null,
stem:"Which ONE of the following completes the statement below?\n\n1) The abnormal Seal Injection flows are due to a __(1)__.\n\n2) In accordance with 1-AP-8.00, LOSS OF NORMAL CHARGING FLOW, a manual Reactor Trip __(2)__ required.",
choices:[[{n:"1)",t:"clogged Seal Injection filter"},{n:"2)",t:"is not"}],[{n:"1)",t:"Seal Injection piping break"},{n:"2)",t:"is not"}],[{n:"1)",t:"clogged Seal Injection filter"},{n:"2)",t:"is"}],[{n:"1)",t:"Seal Injection piping break"},{n:"2)",t:"is"}]],answer:1},

{n:6,year:"2021",ic:null,cc:null,gv:["Unit 1 in CSD and making preps for refueling.","A large Earthquake occurs.","The RHR system was heavily damaged and is unable to provide cooling.","The crew is performing actions per 1-AP-27.00, Loss of Decay Heat Removal, and has been directed to establish Forced Feed Cooling per Attachment 6."],pre:null,
stem:"Which ONE of the following completes both statements in accordance with 1-AP-27.00, LOSS OF DECAY HEAT REMOVAL, Attachment 6, Forced Feed Cooling.\n\n1) The __(1)__ leg is the preferred injection path.\n\n2) LHSI Pump flow is required to be limited to less than __(2)__ gpm.",
choices:[[{n:"1)",t:"hot"},{n:"2)",t:"3000"}],[{n:"1)",t:"cold"},{n:"2)",t:"3000"}],[{n:"1)",t:"cold"},{n:"2)",t:"440"}],[{n:"1)",t:"hot"},{n:"2)",t:"440"}]],answer:1},

{n:7,year:"2021",ic:null,cc:null,gv:["Unit 2 is at 100% power.","The following Unit 2 annunciators are LIT:\n\u25e6 2C-F8, PRZR HI PRESS.\n\u25e6 2D-H4, PRZR SFTY VV PWR RELIEF VV OPEN.","Pressurizer Pressure Control Instrumentation Channels indicate as follows:\n\u25e6 2-RC-PI-2444 is 2210 psig and lowering.\n\u25e6 2-RC-PI-2445 is 2500 psig and stable.","Per immediate action steps, the RO takes the control switch for the affected Pressurizer PORV to CLOSE.","The affected PORV position indicator lights now show GREEN.","Pressurizer Pressure is now 2185 psig and slowly lowering at 5 psig/minute."],pre:null,
stem:"Which ONE of the following completes both statements?\n\n1) In accordance with 0-AP-53.00, LOSS OF VITAL INSTRUMENTATION/CONTROLS, the next required action that will stabilize RCS pressure is to close the associated __(1)__.\n\n2) For the inoperable PORV, Tech Spec 3.1.A.6, RCS \u2013 RELIEF VALVES, __(2)__ de-energizing the associated Block MOV.",
choices:[[{n:"1)",t:"Spray Valve Remote Close SOVs"},{n:"2)",t:"does NOT require"}],[{n:"1)",t:"Spray Valve Remote Close SOVs"},{n:"2)",t:"requires"}],[{n:"1)",t:"Block MOV"},{n:"2)",t:"does NOT require"}],[{n:"1)",t:"Block MOV"},{n:"2)",t:"requires"}]],answer:2},

{n:8,year:"2021",ic:["Unit 1 was operating at 100% when the turbine tripped on low lube oil pressure.","The Reactor failed to trip automatically or manually.","The Crew entered 1-FR-S.1, RESPONSE TO NUCLEAR GENERATION ATWS.","Both Reactor Trip breakers were still closed."],cc:["The Service Building inside watch is dispatched to locally open the Reactor Trip breakers.","Safety Injection is not in service.","Emergency Boration is in progress."],gv:null,pre:null,
stem:"Which ONE of the following completes the following?\n\n1) The Unit 1 Reactor Trip breakers are located in the Unit 1 __(1)__.\n\n2) Per 1-FR-S.1, the crew must remain in 1-FR-S.1 until __(2)__.",
choices:[[{n:"1)",t:"Normal Switchgear Room"},{n:"2)",t:"Emergency boration is complete"}],[{n:"1)",t:"Cable Tray Room"},{n:"2)",t:"PRNI is < 5% and IRNI have negative startup rate"}],[{n:"1)",t:"Cable Tray Room"},{n:"2)",t:"Emergency boration is complete"}],[{n:"1)",t:"Normal Switchgear Room"},{n:"2)",t:"PRNI is < 5% and IRNI have negative startup rate"}]],answer:1},

{n:9,year:"2021",ic:["A Unit 1 \"A\" Steam Generator Tube Rupture (SGTR) occurred.","The \"B\" and \"C\" Reactor Coolant Pumps tripped on Station Service Bus swapover.","The \"A\" RCP remains in operation.","The team has completed RCS cooldown and depressurization per 1-E-3, STEAM GENERATOR TUBE RUPTURE.","The team is performing 1-ES-3.3, POST-SGTR COOLDOWN USING STEAM DUMP.","RCS has been cooled down to 350\u00b0F per 1-ES-3.3.","RCS pressure is 720 psig and stable.","The Unit 1 team is attempting to lower \"A\" S/G pressure by 100 psig, using the MSTV bypass valve.","With \"A\" S/G lowered to 620 psig, RCS leakrate is 100 gpm."],cc:["The \"A\" S/G Pressure was inadvertently lowered to 420 psig, instead of 620 psig, and is continuing to lower due to difficulty reclosing the MSTV bypass valve."],gv:null,pre:null,
stem:"Which ONE of the following completes both statements?\n\n1) With the \"A\" S/G pressure at 420 psig the primary-to-secondary leak rate through the ruptured U-tubes is __(1)__.\n\n2) If the \"A\" MSTV bypass cannot be closed, the first consequence that requires operator action will be __(2)__.",
choices:[[{n:"1)",t:"173 gpm"},{n:"2)",t:"pressure below minimum for continued RCP operation"}],[{n:"1)",t:"173 gpm"},{n:"2)",t:"pressure drop causing vessel head void formation"}],[{n:"1)",t:"141 gpm"},{n:"2)",t:"pressure below minimum for continued RCP operation"}],[{n:"1)",t:"141 gpm"},{n:"2)",t:"pressure drop causing vessel head void formation"}]],answer:0},

{n:12,year:"2021",ic:null,cc:null,gv:["Unit 1 was operating at 100% power.","Multiple annunciators have alarmed including the following:\n\u25e6 1F-F1/2/3: STM GEN 1A/1B/1C CH 3 HI STM LINE FLOW.\n\u25e6 1E-E6: RX TRIP CH 3 OT \u0394T LOOP 1C.\n\u25e6 1E-E7: RX TRIP CH 3 OP \u0394T LOOP 1C.\n\u25e6 1C-A1: RCP 1A CC RETURN LO FLOW.\n\u25e6 1C-F3: RCP 1C SHAFT SEAL WTR LO INJ FLOW"],pre:null,
stem:"Based on the conditions given, which ONE of the following correctly completes the statements below?\n\n1) A loss of Vital Bus __(1)__ has occurred.\n\n2) The abnormal procedure for this Vital Bus __(2)__ a step to trip the reactor.",

// ── STATE ──────────────────────────────────────────────────────────────────
let selCat=Object.keys(QB)[0],quizQ=[],curIdx=0,answered=false,results=[],correct=0;

function showScreen(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a=>a.classList.remove('active'));
  const el=document.getElementById('nav-'+n);if(el)el.classList.add('active');
}

function renderHome(){
  const g=document.getElementById('home-grid');g.innerHTML='';
  Object.keys(QB).forEach(cat=>{
    const d=document.createElement('div');d.className='quiz-card';
    d.innerHTML=`<h3>${cat}</h3><p>${QB[cat].questions.length} questions &middot; ${QB[cat].years.join(', ')}</p>`;
    d.onclick=()=>{selCat=cat;startSetup();};g.appendChild(d);
  });
}

function startSetup(){
  const sg=document.getElementById('setup-grid');sg.innerHTML='';
  Object.keys(QB).forEach(cat=>{
    const d=document.createElement('div');d.className='quiz-card'+(cat===selCat?' selected':'');
    d.innerHTML=`<h3>${cat}</h3><p>${QB[cat].questions.length} questions &middot; ${QB[cat].years.join(', ')}</p>`;
    d.onclick=()=>{selCat=cat;document.querySelectorAll('#setup-grid .quiz-card').forEach(c=>c.classList.remove('selected'));d.classList.add('selected');renderYears();};
    sg.appendChild(d);
  });
  renderYears();showScreen('setup');document.getElementById('nav-quiz').classList.add('active');
}

function renderYears(){
  const c=document.getElementById('year-list');c.innerHTML='';
  QB[selCat].years.forEach(y=>{
    const l=document.createElement('label');l.className='year-item';
    l.innerHTML=`<input type="checkbox" value="${y}" checked> ${y} NRC Exam`;c.appendChild(l);
  });
}

function beginQuiz(){
  const sel=Array.from(document.querySelectorAll('#year-list input:checked')).map(c=>c.value);
  if(!sel.length){alert('Select at least one exam year.');return;}
  let pool=QB[selCat].questions.filter(q=>sel.includes(q.year));
  if(!pool.length){alert('No questions for selected years.');return;}
  shuffle(pool);
  const cv=document.getElementById('q-count').value;
  quizQ=pool.slice(0,cv==='all'?pool.length:Math.min(parseInt(cv),pool.length));
  curIdx=0;results=[];correct=0;
  document.getElementById('quiz-label').textContent=selCat+' Quiz';
  showScreen('quiz');renderQ();
}

function buildScenario(q){
  let h='';
  if(q.pre) h+=`<div class="scenario-box"><p>${q.pre.replace(/\n/g,'<br>')}</p></div>`;
  if(q.ic||q.cc||q.gv){
    h+='<div class="scenario-box">';
    if(q.gv) h+=`<span class="slabel">Given the following:</span><ul>${q.gv.map(i=>`<li>${i.replace(/\n/g,'<br>')}</li>`).join('')}</ul>`;
    if(q.ic) h+=`<span class="slabel">Initial Conditions:</span><ul>${q.ic.map(i=>`<li>${i.replace(/\n/g,'<br>')}</li>`).join('')}</ul>`;
    if(q.cc) h+=`<span class="slabel">Current Conditions:</span><ul>${q.cc.map(i=>`<li>${i.replace(/\n/g,'<br>')}</li>`).join('')}</ul>`;
    h+='</div>';
  }
  return h;
}

function renderQ(){
  const q=quizQ[curIdx];answered=false;
  document.getElementById('q-counter').textContent=`Question ${curIdx+1} of ${quizQ.length}`;
  document.getElementById('q-score-live').textContent=`Score: ${correct} / ${curIdx}`;
  document.getElementById('q-fill').style.width=(curIdx/quizQ.length*100)+'%';
  document.getElementById('q-num-tag').textContent=`Question ${q.n}`;
  document.getElementById('q-scenario').innerHTML=buildScenario(q);
  document.getElementById('q-stem').textContent=q.stem||'';
  const fb=document.getElementById('q-feedback');fb.className='answer-feedback';fb.textContent='';
  const nb=document.getElementById('q-next');nb.style.display='none';
  nb.textContent=curIdx+1<quizQ.length?'Next Question \u2192':'See Results \u2192';
  const ce=document.getElementById('q-choices');ce.innerHTML='';
  const L=['A','B','C','D'];
  q.choices.forEach((parts,i)=>{
    const btn=document.createElement('button');btn.className='choice-btn';
    const ph=parts.map(p=>`<div class="cpart">${p.n?`<span class="pn">${p.n}</span> `:''}${p.t}</div>`).join('');
    btn.innerHTML=`<span class="cltr">${L[i]}.</span><div class="cparts">${ph}</div>`;
    btn.onclick=()=>pick(i);ce.appendChild(btn);
  });
}

function pick(idx){
  if(answered)return;answered=true;
  const q=quizQ[curIdx];const ok=idx===q.answer;if(ok)correct++;
  results.push({q,sel:idx,ok});
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.answer)b.classList.add('correct');
    else if(i===idx&&!ok)b.classList.add('wrong');
  });
  const fb=document.getElementById('q-feedback');
  fb.className='answer-feedback show '+(ok?'correct':'wrong');
  fb.textContent=ok?'\u2713 Correct!':'\u2717 Incorrect.';
  document.getElementById('q-next').style.display='inline-block';
  document.getElementById('q-score-live').textContent=`Score: ${correct} / ${curIdx+1}`;
}

function nextQ(){
  if(!answered)return;curIdx++;
  if(curIdx>=quizQ.length)showResults();else renderQ();
}

function showResults(){
  const total=quizQ.length,pct=Math.round(correct/total*100),wrong=total-correct;
  document.getElementById('res-total').textContent=total;
  document.getElementById('res-correct').textContent=correct;
  document.getElementById('res-wrong').textContent=wrong;
  document.getElementById('score-pct').textContent=pct+'%';
  const bn=document.getElementById('score-banner');let desc;
  if(pct>=80){bn.className='score-banner pass';desc=`Excellent \u2014 ${correct} of ${total} correct`;}
  else if(pct>=60){bn.className='score-banner ok';desc=`Good effort \u2014 ${correct} of ${total} correct`;}
  else{bn.className='score-banner fail';desc=`Keep studying \u2014 ${correct} of ${total} correct`;}
  document.getElementById('score-desc').textContent=desc;
  const L=['A','B','C','D'],rl=document.getElementById('review-list');rl.innerHTML='';
  results.forEach((r,i)=>{
    const item=document.createElement('div');item.className='review-item';
    const hdr=document.createElement('div');hdr.className='review-header';
    hdr.innerHTML=`<span class="review-status ${r.ok?'status-correct':'status-wrong'}">${r.ok?'Correct':'Wrong'}</span><span class="review-q-text">Q${r.q.n}: ${(r.q.stem||r.q.pre||'').split('\n')[0].substring(0,100)}</span>`;
    const body=document.createElement('div');body.className='review-body';
    let bh='';
    if(r.q.pre||r.q.ic||r.q.cc||r.q.gv){
      bh+='<div class="review-scenario">';
      if(r.q.pre)bh+=`<p>${r.q.pre}</p>`;
      if(r.q.gv)bh+=`<span class="slabel">Given:</span><ul>${r.q.gv.map(x=>`<li>${x}</li>`).join('')}</ul>`;
      if(r.q.ic)bh+=`<span class="slabel">Initial Conditions:</span><ul>${r.q.ic.map(x=>`<li>${x}</li>`).join('')}</ul>`;
      if(r.q.cc)bh+=`<span class="slabel">Current Conditions:</span><ul>${r.q.cc.map(x=>`<li>${x}</li>`).join('')}</ul>`;
      bh+='</div>';
    }
    bh+=`<div class="review-stem">${r.q.stem||''}</div>`;
    bh+=r.q.choices.map((parts,ci)=>{
      let cls='',mk='';
      if(ci===r.q.answer){cls='correct-ans';mk='\u2713 ';}
      else if(ci===r.sel&&!r.ok){cls='wrong-ans';mk='\u2717 ';}
      const pt=parts.map(p=>`${p.n?p.n+' ':''}${p.t}`).join(' | ');
      return `<div class="review-choice ${cls}">${mk}<strong>${L[ci]}.</strong> ${pt}</div>`;
    }).join('');
    body.innerHTML=bh;
    hdr.onclick=()=>body.classList.toggle('open');
    item.appendChild(hdr);item.appendChild(body);rl.appendChild(item);
  });
  showScreen('results');
}

document.addEventListener('keydown',e=>{
  if(!document.getElementById('screen-quiz').classList.contains('active'))return;
  const m={'a':0,'b':1,'c':2,'d':3},k=e.key.toLowerCase();
  if(m[k]!==undefined&&!answered)pick(m[k]);
  else if(k==='enter'&&answered)nextQ();
});

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

renderHome();
</script>
